<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EDITORON-7</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    @keyframes scanmove { 0%{transform:translateY(-100%)} 100%{transform:translateY(100vh)} }
    #file-input { position:fixed; top:-999px; left:-999px; opacity:0; }
  </style>
</head>
<body>
  <input id="file-input" type="file" accept="*/*" />
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useCallback, useEffect } = React;

    const FONT_SIZES = [12, 14, 16, 18, 20, 24];

    const PALETTES = {
      paper: { name:"PAPER", text:"#2b1d0e", dim:"#a08060", bg:"#f5efe0", surface:"#ede4ce", glow:"#2b1d0e22", scanline:"#00000008" },
      mint:  { name:"MINT",  text:"#0a3d2e", dim:"#5a9e80", bg:"#e8f5ef", surface:"#d6ede2", glow:"#0a3d2e22", scanline:"#00000008" },
      slate: { name:"SLATE", text:"#1a2a3a", dim:"#7090a0", bg:"#eaf0f5", surface:"#dae4ec", glow:"#1a2a3a22", scanline:"#00000008" },
      sepia: { name:"SEPIA", text:"#3b1f0a", dim:"#b08050", bg:"#faf3e0", surface:"#f0e6c8", glow:"#3b1f0a22", scanline:"#00000008" },
    };

    // ── Crypto ────────────────────────────────────────────────────────────
    const TENC = new TextEncoder();
    const TDEC = new TextDecoder();

    function isEncFile(bytes) {
      return bytes.length > 32
        && bytes[0] === 0x45
        && bytes[1] === 0x4e
        && bytes[2] === 0x43
        && bytes[3] === 0x37;
    }

    async function deriveKey(password, salt) {
      const raw = await crypto.subtle.importKey("raw", TENC.encode(password), "PBKDF2", false, ["deriveKey"]);
      return crypto.subtle.deriveKey(
        { name:"PBKDF2", salt, iterations:310000, hash:"SHA-256" },
        raw,
        { name:"AES-GCM", length:256 },
        false,
        ["encrypt","decrypt"]
      );
    }

    async function encryptText(plaintext, password) {
      const salt = crypto.getRandomValues(new Uint8Array(16));
      const iv   = crypto.getRandomValues(new Uint8Array(12));
      const key  = await deriveKey(password, salt);
      const ct   = await crypto.subtle.encrypt({ name:"AES-GCM", iv }, key, TENC.encode(plaintext));
      const out  = new Uint8Array(4 + 16 + 12 + ct.byteLength);
      out.set([0x45,0x4e,0x43,0x37], 0);
      out.set(salt, 4);
      out.set(iv,   20);
      out.set(new Uint8Array(ct), 32);
      return out;
    }

    async function decryptBytes(bytes, password) {
      if (!isEncFile(bytes)) throw new Error("NOT_ENC");
      const salt = bytes.slice(4, 20);
      const iv   = bytes.slice(20, 32);
      const ct   = bytes.slice(32);
      const key  = await deriveKey(password, salt);
      const pt   = await crypto.subtle.decrypt({ name:"AES-GCM", iv }, key, ct);
      return TDEC.decode(pt);
    }

    // ── Password Modal ────────────────────────────────────────────────────
    function PasswordModal({ mode, p, onConfirm, onCancel }) {
      const [pw,  setPw]  = useState("");
      const [pw2, setPw2] = useState("");
      const [err, setErr] = useState("");
      const ref = useRef(null);
      useEffect(() => { ref.current && ref.current.focus(); }, []);

      const go = () => {
        if (!pw)                            return setErr("PASSWORD REQUIRED");
        if (pw.length < 4)                  return setErr("MIN 4 CHARACTERS");
        if (mode==="encrypt" && pw !== pw2) return setErr("PASSWORDS DO NOT MATCH");
        onConfirm(pw);
      };

      const inp = {
        type:"password", style:{
          width:"100%", padding:"6px 10px", marginBottom:"10px",
          background:p.bg, border:`1px solid ${p.dim}`, color:p.text,
          fontFamily:"'VT323',monospace", fontSize:"16px",
          letterSpacing:"0.08em", outline:"none", display:"block"
        }
      };

      return (
        <div style={{position:"fixed",inset:0,zIndex:500,background:"#00000066",
          display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{background:p.surface,border:`2px solid ${p.dim}`,padding:"28px 32px",
            minWidth:"320px",fontFamily:"'VT323',monospace",color:p.text,
            letterSpacing:"0.08em",boxShadow:`4px 4px 0 ${p.dim}`,zIndex:501}}>
            <div style={{fontSize:"18px",marginBottom:"16px",borderBottom:`1px solid ${p.dim}`,paddingBottom:"8px"}}>
              {mode==="encrypt" ? "◈ ENCRYPT & SAVE" : "◈ DECRYPT FILE"}
            </div>
            <div style={{fontSize:"13px",color:p.dim,marginBottom:"10px"}}>
              {mode==="encrypt" ? "SET PASSPHRASE:" : "ENTER PASSPHRASE:"}
            </div>
            <input {...inp} ref={ref} value={pw}
              onChange={e=>{setPw(e.target.value);setErr("");}}
              onKeyDown={e=>e.key==="Enter"&&go()}
              placeholder="passphrase..." />
            {mode==="encrypt" && (
              <input {...inp} value={pw2}
                onChange={e=>{setPw2(e.target.value);setErr("");}}
                onKeyDown={e=>e.key==="Enter"&&go()}
                placeholder="confirm passphrase..." />
            )}
            {err && <div style={{color:"#b03020",fontSize:"13px",marginBottom:"8px"}}>⚠ {err}</div>}
            <div style={{display:"flex",gap:"10px",marginTop:"8px"}}>
              <button onClick={go}
                style={{flex:1,padding:"6px",background:p.text,color:p.bg,border:"none",
                  fontFamily:"'VT323',monospace",fontSize:"16px",letterSpacing:"0.1em",cursor:"pointer"}}>
                {mode==="encrypt" ? "[ ENCRYPT ]" : "[ UNLOCK ]"}
              </button>
              <button onClick={onCancel}
                style={{flex:1,padding:"6px",background:"none",color:p.dim,border:`1px solid ${p.dim}`,
                  fontFamily:"'VT323',monospace",fontSize:"16px",letterSpacing:"0.1em",cursor:"pointer"}}>
                [ CANCEL ]
              </button>
            </div>
            <div style={{fontSize:"11px",color:p.dim,marginTop:"14px",lineHeight:1.5}}>
              AES-256-GCM · PBKDF2 · LOCAL ONLY<br/>KEY NEVER LEAVES THIS DEVICE.
            </div>
          </div>
        </div>
      );
    }

    // ── App ───────────────────────────────────────────────────────────────
    function App() {
      const [text,        setText]        = useState("SYSTEM READY.\n\n> Begin typing your document...\n\nAll systems nominal. Uplink established.\nType freely. Press CTRL+S to save to disk.");
      const [fileName,    setFileName]    = useState("DOC001.TXT");
      const [fontSize,    setFontSize]    = useState(15);
      const [palette,     setPalette]     = useState("paper");
      const [wordWrap,    setWordWrap]    = useState(true);
      const [lineNums,    setLineNums]    = useState(true);
      const [saved,       setSaved]       = useState(false);
      const [editName,    setEditName]    = useState(false);
      const [blink,       setBlink]       = useState(true);
      const [scanlines,   setScanlines]   = useState(true);
      const [flicker,     setFlicker]     = useState(false);
      const [modal,       setModal]       = useState(null);
      const [statusMsg,   setStatusMsg]   = useState("");
      const [isEncrypted, setIsEncrypted] = useState(false);

      const pendingBytes = useRef(null);
      const pendingName  = useRef(null);
      const taRef        = useRef(null);
      const nameRef      = useRef(null);
      const p = PALETTES[palette];

      useEffect(() => { const t = setInterval(()=>setBlink(b=>!b),530); return ()=>clearInterval(t); },[]);
      useEffect(() => {
        const t = setInterval(()=>{
          if(Math.random()<0.04){setFlicker(true);setTimeout(()=>setFlicker(false),80);}
        },1200);
        return ()=>clearInterval(t);
      },[]);
      useEffect(() => { if(editName && nameRef.current) nameRef.current.focus(); },[editName]);

      const flash = (msg) => { setStatusMsg(msg); setTimeout(()=>setStatusMsg(""),3500); };

      const wordCount = text.trim() ? text.trim().split(/\s+/).length : 0;
      const charCount = text.length;
      const lines     = text.split("\n");
      const timeStr   = new Date().toLocaleTimeString("en-US",{hour12:false,hour:"2-digit",minute:"2-digit",second:"2-digit"});

      useEffect(() => {
        const el = document.getElementById("file-input");
        const handler = async (e) => {
          const file = e.target.files && e.target.files[0];
          if (!file) return;
          el.value = "";
          try {
            const buf   = await file.arrayBuffer();
            const bytes = new Uint8Array(buf);
            if (isEncFile(bytes)) {
              pendingBytes.current = bytes;
              pendingName.current  = file.name;
              setModal("decrypt");
            } else {
              setFileName(file.name.toUpperCase());
              setText(TDEC.decode(bytes));
              setIsEncrypted(false);
              flash("✓ FILE LOADED");
            }
          } catch(err) {
            flash("⚠ COULD NOT READ FILE");
          }
        };
        el.addEventListener("change", handler);
        return () => el.removeEventListener("change", handler);
      }, []);

      const handleOpen = () => {
        const el = document.getElementById("file-input");
        el.value = "";
        el.click();
      };

      const handleSave = () => {
        const blob = new Blob([text],{type:"text/plain"});
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement("a");
        a.href=url; a.download=fileName; a.click();
        URL.revokeObjectURL(url);
        setSaved(true); setTimeout(()=>setSaved(false),2000);
      };

      const handleSaveEncrypted = () => setModal("encrypt");

      const onEncryptConfirm = async (password) => {
        setModal(null);
        try {
          const bytes = await encryptText(text, password);
          const blob  = new Blob([bytes],{type:"application/octet-stream"});
          const url   = URL.createObjectURL(blob);
          const a     = document.createElement("a");
          a.href=url;
          a.download = fileName.replace(/\.[^.]+$/,"")+".enc";
          a.click();
          URL.revokeObjectURL(url);
          setIsEncrypted(true);
          flash("✓ ENCRYPTED & SAVED");
        } catch(err) {
          flash("⚠ ENCRYPTION FAILED");
        }
      };

      const onDecryptConfirm = async (password) => {
        setModal(null);
        const bytes = pendingBytes.current;
        const name  = pendingName.current;
        if (!bytes) { flash("⚠ NO FILE PENDING"); return; }
        try {
          const plain = await decryptBytes(bytes, password);
          setText(plain);
          setFileName(name.toUpperCase());
          setIsEncrypted(true);
          flash("✓ DECRYPTED OK");
        } catch(err) {
          flash("⚠ WRONG PASSPHRASE OR CORRUPT FILE");
        }
        pendingBytes.current = null;
        pendingName.current  = null;
      };

      const onDecryptCancel = () => {
        setModal(null);
        pendingBytes.current = null;
        pendingName.current  = null;
      };

      const handleKeyDown = (e) => {
        if ((e.ctrlKey||e.metaKey) && e.shiftKey && e.key==="E") { e.preventDefault(); handleSaveEncrypted(); return; }
        if ((e.ctrlKey||e.metaKey) && e.key==="s") { e.preventDefault(); handleSave(); return; }
        if (e.key==="Tab") {
          e.preventDefault();
          const s=e.target.selectionStart, end=e.target.selectionEnd;
          const next=text.substring(0,s)+"  "+text.substring(end);
          setText(next);
          requestAnimationFrame(()=>{ e.target.selectionStart=e.target.selectionEnd=s+2; });
        }
      };

      const rb = (active, extra={}) => ({
        background:"none", border:`1px solid ${active?p.text:p.dim}`,
        color:active?p.text:p.dim, cursor:"pointer", padding:"2px 10px",
        fontFamily:"'VT323',monospace", fontSize:"14px",
        letterSpacing:"0.05em", whiteSpace:"nowrap",
        ...(active?{background:p.text+"18"}:{}), ...extra
      });

      return (
        <div style={{fontFamily:"'VT323','Courier New',monospace",background:p.bg,
          minHeight:"100vh",display:"flex",flexDirection:"column",color:p.text,
          opacity:flicker?0.88:1,transition:"opacity 0.05s",position:"relative",overflow:"hidden"}}>

          <style>{`
            textarea{resize:none;outline:none;border:none;background:transparent;caret-color:transparent;}
            textarea::selection{background:${p.text}33;}
            input[type=text]{outline:none;border:none;background:transparent;caret-color:${p.text};}
            input[type=password]{font-family:'VT323',monospace;}
            ::-webkit-scrollbar{width:8px;}
            ::-webkit-scrollbar-track{background:${p.bg};}
            ::-webkit-scrollbar-thumb{background:${p.dim};}
            select{background:${p.surface};border:1px solid ${p.dim};color:${p.dim};
              font-family:'VT323',monospace;font-size:14px;padding:2px 6px;cursor:pointer;outline:none;}
          `}</style>

          {modal==="encrypt" && <PasswordModal mode="encrypt" p={p} onConfirm={onEncryptConfirm} onCancel={()=>setModal(null)} />}
          {modal==="decrypt" && <PasswordModal mode="decrypt" p={p} onConfirm={onDecryptConfirm} onCancel={onDecryptCancel} />}

          {scanlines && <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:100,
            backgroundImage:`repeating-linear-gradient(0deg,transparent,transparent 2px,${p.scanline} 2px,${p.scanline} 4px)`}} />}
          {scanlines && <div style={{position:"fixed",left:0,right:0,height:"40px",pointerEvents:"none",zIndex:101,
            background:`linear-gradient(transparent,${p.dim}18,transparent)`,animation:"scanmove 6s linear infinite"}} />}
          <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:99,
            background:`radial-gradient(ellipse at center,transparent 60%,${p.bg}cc 100%)`}} />

          {/* ── Toolbar ── */}
          <div style={{borderBottom:`1px solid ${p.dim}`,padding:"6px 14px",display:"flex",
            alignItems:"center",gap:"8px",flexWrap:"wrap",background:`${p.surface}ee`,
            letterSpacing:"0.08em",fontSize:"15px",position:"relative",zIndex:10}}>

            <span style={{fontSize:"18px",fontWeight:"bold",letterSpacing:"0.2em",textShadow:`0 1px 2px ${p.glow}`}}>
              ◈ EDITORON-7
            </span>
            <span style={{fontSize:"13px",color:p.dim}}>v2.6</span>
            <div style={{width:1,height:18,background:p.dim}} />

            {editName
              ? <input ref={nameRef} type="text" value={fileName}
                  onChange={e=>setFileName(e.target.value.toUpperCase())}
                  onBlur={()=>setEditName(false)}
                  onKeyDown={e=>e.key==="Enter"&&setEditName(false)}
                  style={{color:p.text,fontSize:"15px",fontFamily:"'VT323',monospace",
                    width:"160px",borderBottom:`1px solid ${p.text}`,background:"transparent",
                    letterSpacing:"0.08em"}} />
              : <span onClick={()=>setEditName(true)}
                  style={{cursor:"text",letterSpacing:"0.1em",borderBottom:`1px dashed ${p.dim}`,
                    display:"flex",alignItems:"center",gap:"5px"}}>
                  {isEncrypted && "🔒"}{fileName}
                </span>
            }

            <div style={{width:1,height:18,background:p.dim}} />
            <button style={rb(false)} onClick={handleOpen}>[ LOAD ]</button>
            <button style={rb(false,saved?{borderColor:p.text,color:p.text}:{})} onClick={handleSave}>
              {saved?"[ ✓ SAVED ]":"[ SAVE ]"}
            </button>
            <button style={rb(false,{borderColor:"#8a4010",color:"#8a4010"})} onClick={handleSaveEncrypted}>
              [ 🔐 ENCRYPT+SAVE ]
            </button>
            <div style={{width:1,height:18,background:p.dim}} />

            {Object.entries(PALETTES).map(([k,v])=>(
              <button key={k} style={rb(palette===k)} onClick={()=>setPalette(k)}>{v.name}</button>
            ))}
            <div style={{width:1,height:18,background:p.dim}} />

            <select value={fontSize} onChange={e=>setFontSize(Number(e.target.value))}>
              {FONT_SIZES.map(s=><option key={s} value={s}>{s}PT</option>)}
            </select>
            <button style={rb(wordWrap)}  onClick={()=>setWordWrap(w=>!w)}>WRAP</button>
            <button style={rb(lineNums)}  onClick={()=>setLineNums(l=>!l)}>LNUM</button>
            <button style={rb(scanlines)} onClick={()=>setScanlines(s=>!s)}>SCAN</button>
          </div>

          {/* ── Editor ── */}
          <div style={{flex:1,display:"flex",overflow:"hidden",minHeight:0}}>
            {lineNums && (
              <div style={{width:"52px",borderRight:`1px solid ${p.dim}33`,padding:"12px 0",
                overflowY:"hidden",userSelect:"none",flexShrink:0,background:p.surface}}>
                {lines.map((_,i)=>(
                  <div key={i} style={{textAlign:"right",paddingRight:"10px",fontSize:"13px",
                    color:p.dim,lineHeight:`${fontSize*1.55}px`,fontFamily:"'VT323',monospace"}}>
                    {String(i+1).padStart(3,"0")}
                  </div>
                ))}
              </div>
            )}
            <div style={{flex:1,overflow:"auto"}}>
              <textarea ref={taRef} value={text}
                onChange={e=>setText(e.target.value)}
                onKeyDown={handleKeyDown}
                spellCheck={false}
                style={{width:"100%",minHeight:"100%",padding:"12px 20px",
                  fontSize:`${fontSize}px`,fontFamily:"'VT323','Courier New',monospace",
                  lineHeight:1.55,color:p.text,background:"transparent",
                  whiteSpace:wordWrap?"pre-wrap":"pre",
                  overflowWrap:wordWrap?"break-word":"normal",letterSpacing:"0.04em"}}
              />
            </div>
          </div>

          {/* ── Status bar ── */}
          <div style={{borderTop:`1px solid ${p.dim}`,padding:"4px 16px",display:"flex",
            alignItems:"center",gap:"18px",fontSize:"13px",background:`${p.surface}ee`,
            letterSpacing:"0.1em",position:"relative",zIndex:10}}>
            <span style={{color:p.dim}}>LN:{String(lines.length).padStart(4,"0")}</span>
            <span style={{color:p.dim}}>WD:{String(wordCount).padStart(5,"0")}</span>
            <span style={{color:p.dim}}>CH:{String(charCount).padStart(6,"0")}</span>
            {statusMsg && <span style={{color:statusMsg.startsWith("⚠")?"#b03020":"#2a7a2a",fontWeight:"bold"}}>{statusMsg}</span>}
            <span style={{marginLeft:"auto",color:p.dim}}>
              {timeStr}
              <span style={{opacity:blink?1:0,marginLeft:"6px",color:p.text}}>█</span>
            </span>
            <span style={{color:p.dim,fontSize:"12px",opacity:0.6}}>^S=SAVE · ^⇧E=ENCRYPT</span>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
